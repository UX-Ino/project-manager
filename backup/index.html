<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM 웹 접근성 체크리스트 관리 툴</title>
  <!-- Google Fonts & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase JS Client library CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Custom Style Sheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. 로그인 / 회원가입 화면 -->
  <div id="auth-container" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <i class="fa-solid fa-square-check logo-icon"></i>
        <h1>PM Checklist</h1>
        <p>웹 접근성 프로젝트 PM 관리 툴</p>
      </div>
      
      <!-- 로그인 폼 -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email"><i class="fa-regular fa-envelope"></i> 이메일</label>
          <input type="email" id="login-email" required placeholder="name@etribe.co.kr">
        </div>
        <div class="form-group">
          <label for="login-password"><i class="fa-solid fa-lock"></i> 비밀번호</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block">로그인</button>
        <p class="auth-toggle">계정이 없으신가요? <a href="#" id="to-signup">회원가입</a></p>
      </form>

      <!-- 회원가입 폼 (기본 숨김) -->
      <form id="signup-form" class="auth-form hidden">
        <div class="form-group">
          <label for="signup-email"><i class="fa-regular fa-envelope"></i> 이메일</label>
          <input type="email" id="signup-email" required placeholder="name@etribe.co.kr">
        </div>
        <div class="form-group">
          <label for="signup-password"><i class="fa-solid fa-lock"></i> 비밀번호</label>
          <input type="password" id="signup-password" required placeholder="최소 6자리 이상">
        </div>
        <button type="submit" class="btn btn-accent btn-block">회원가입</button>
        <p class="auth-toggle">이미 계정이 있으신가요? <a href="#" id="to-login">로그인</a></p>
      </form>
    </div>
  </div>

  <!-- 2. 메인 애플리케이션 화면 (로그인 후 노출) -->
  <div id="app-container" class="app-wrapper hidden">
    
    <!-- 헤더 & 네비게이션 -->
    <header class="main-header">
      <div class="header-left">
        <i class="fa-solid fa-circle-check brand-icon"></i>
        <span class="brand-title">Etribe PM Tool</span>
      </div>
      <div class="header-center">
        <div class="project-selector-wrapper">
          <select id="project-select" class="custom-select">
            <option value="">프로젝트 선택...</option>
          </select>
          <button id="btn-add-project" class="btn btn-icon-only" title="프로젝트 생성"><i class="fa-solid fa-folder-plus"></i></button>
          <button id="btn-delete-project" class="btn btn-icon-only btn-danger-soft" title="프로젝트 삭제"><i class="fa-regular fa-trash-can"></i></button>
        </div>
      </div>
      <div class="header-right">
        <span id="user-display" class="user-badge"><i class="fa-regular fa-user"></i> Loading...</span>
        <button id="btn-logout" class="btn btn-sm btn-outline"><i class="fa-solid fa-arrow-right-from-bracket"></i> 로그아웃</button>
      </div>
    </header>

    <!-- 대시보드 요약 지표 -->
    <section class="dashboard-section">
      <div class="dashboard-grid">
        <div class="metric-card card-progress">
          <div class="metric-info">
            <span class="metric-label">전체 완료율</span>
            <span id="txt-total-progress" class="metric-value">0%</span>
          </div>
          <div class="progress-bar-container">
            <div id="bar-total-progress" class="progress-bar-fill" style="width: 0%"></div>
          </div>
        </div>
        <div class="metric-card">
          <div class="metric-icon bg-warning-soft text-warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <div class="metric-info">
            <span class="metric-label">남은 리스크</span>
            <span id="txt-risk-count" class="metric-value">0</span>
          </div>
        </div>
        <div class="metric-card">
          <div class="metric-icon bg-info-soft text-info"><i class="fa-regular fa-file-lines"></i></div>
          <div class="metric-info">
            <span class="metric-label">완료 산출물</span>
            <span id="txt-doc-count" class="metric-value">0</span>
          </div>
        </div>
        <div class="metric-card">
          <div class="metric-icon bg-accent-soft text-accent"><i class="fa-solid fa-link"></i></div>
          <div class="metric-info">
            <span class="metric-label">외부 솔루션 이슈</span>
            <span id="txt-ext-count" class="metric-value">0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 단계별 탭 바 -->
    <nav class="phase-tabs-nav">
      <button class="phase-tab active" data-phase="pre">
        <span class="tab-title">착수 전</span>
        <span id="badge-pre" class="tab-badge">0/0</span>
      </button>
      <button class="phase-tab" data-phase="in_progress">
        <span class="tab-title">진행 중</span>
        <span id="badge-in_progress" class="tab-badge">0/0</span>
      </button>
      <button class="phase-tab" data-phase="review">
        <span class="tab-title">심사 단계</span>
        <span id="badge-review" class="tab-badge">0/0</span>
      </button>
      <button class="phase-tab" data-phase="done">
        <span class="tab-title">완료 후</span>
        <span id="badge-done" class="tab-badge">0/0</span>
      </button>
    </nav>

    <!-- 메인 컨텐츠 영역 -->
    <main class="main-content">
      <!-- 빈 프로젝트 안내 -->
      <div id="empty-state" class="empty-state">
        <i class="fa-solid fa-folder-open empty-icon"></i>
        <h3>선택된 프로젝트가 없거나 생성되지 않았습니다</h3>
        <p>상단의 드롭다운 메뉴에서 프로젝트를 선택하거나 새 프로젝트를 추가해 주세요.</p>
        <button id="btn-create-first" class="btn btn-primary"><i class="fa-solid fa-plus"></i> 새 프로젝트 만들기</button>
      </div>

      <!-- 체크리스트 목록 영역 -->
      <div id="checklist-container" class="checklist-grid hidden">
        <!-- 동적 그룹 & 아이템 카드들이 여기에 추가됨 -->
      </div>
    </main>
  </div>

  <!-- 3. 모달 레이어들 -->
  
  <!-- 프로젝트 추가 모달 -->
  <div id="modal-project" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>새 프로젝트 추가</h2>
        <button class="modal-close btn-close-project"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="project-form">
        <div class="form-group">
          <label for="new-project-name">프로젝트명</label>
          <input type="text" id="new-project-name" required placeholder="예: 롯데잇츠 웹 접근성">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline btn-close-project">취소</button>
          <button type="submit" class="btn btn-primary">프로젝트 생성 & 기본데이터 주입</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 항목 추가/수정 모달 -->
  <div id="modal-item" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-item-title">체크리스트 항목 추가</h2>
        <button class="modal-close btn-close-item"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="item-form">
        <input type="hidden" id="edit-item-id">
        <div class="form-group">
          <label for="item-group">그룹명 (카테고리)</label>
          <input type="text" id="item-group" required placeholder="예: 계약 & 범위, 개발 환경 사전 신청">
        </div>
        <div class="form-group">
          <label for="item-text">체크리스트 내용</label>
          <textarea id="item-text" required rows="3" placeholder="체크리스트에 표시할 세부 업무 내용을 입력하세요"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group half">
            <label for="item-tag">태그 설정</label>
            <select id="item-tag" class="custom-select">
              <option value="">없음</option>
              <option value="risk">⚠️ 리스크 (risk)</option>
              <option value="doc">📄 산출물 (doc)</option>
              <option value="ext">🔗 외부 솔루션 (ext)</option>
            </select>
          </div>
          <div class="form-group half">
            <label for="item-assignee">담당자</label>
            <input type="text" id="item-assignee" placeholder="예: 정인호">
          </div>
        </div>
        <div class="form-group">
          <label for="item-due-date">마감일</label>
          <input type="date" id="item-due-date">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline btn-close-item">취소</button>
          <button type="submit" id="btn-save-item" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 이미지 크게 보기 모달 -->
  <div id="modal-image-viewer" class="modal-overlay image-viewer-overlay hidden">
    <div class="image-viewer-card">
      <button class="image-viewer-close"><i class="fa-solid fa-xmark"></i></button>
      <img id="img-fullscreen" src="" alt="첨부 이미지 원본">
    </div>
  </div>

  <!-- 실시간 알림 토스트 -->
  <div id="toast-container" class="toast-container"></div>

</body>
</html>
